<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Inconnu | Expérience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Outfit:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #faf9f6;
            --gold: #b8974a;
            --border: rgba(255,255,255,0.1);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif; overflow: hidden;
        }

        /* Conteneur Principal */
        .quiz-wrapper {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        .step { display: none; width: 100%; max-width: 500px; text-align: center; }
        .step.active { display: block; animation: fadeIn 0.8s ease forwards; }

        h2 { 
            font-family: 'Cormorant Garamond', serif; font-style: italic; 
            font-size: 2.5rem; font-weight: 400; margin-bottom: 2rem; 
        }

        /* Inputs Style */
        input {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid var(--border); color: white;
            padding: 15px 0; font-size: 1.2rem; text-align: center;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }

        /* Grille pour les âges générés */
        #age-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 15px; margin-top: 20px;
        }
        .age-input { font-size: 1rem !important; border-bottom: 1px solid var(--gold) !important; }

        /* Navigation */
        .nav-buttons {
            position: fixed; bottom: 50px; display: flex; gap: 40px;
            align-items: center;
        }
        button {
            background: none; border: 1px solid var(--border); color: white;
            padding: 12px 30px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; font-size: 10px; transition: 0.3s;
        }
        button:hover { border-color: var(--gold); color: var(--gold); }
        .btn-next { background: var(--text); color: var(--bg); border: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quiz-wrapper">
    <form id="voyageForm">
        
        <div class="step active" data-step="1">
            <h2>Quand commence<br>le mystère ?</h2>
            <input type="date" name="date_depart" required>
        </div>

        <div class="step" data-step="2">
            <h2>Quand souhaitez-vous<br>revenir ?</h2>
            <input type="date" name="date_retour" required>
        </div>

        <div class="step" data-step="3">
            <h2>Combien de voyageurs<br>êtes-vous ?</h2>
            <input type="number" id="nb_voyageurs" name="nb_voyageurs" min="1" max="10" placeholder="Nombre" oninput="updateAgeFields(this.value)" required>
            <div id="age-grid"></div>
        </div>

        <div class="step" data-step="4">
            <h2>Presque terminé...</h2>
            <p>Nous préparons votre itinéraire secret.</p>
        </div>

    </form>

    <div class="nav-buttons">
        <button id="prevBtn" onclick="changeStep(-1)" style="visibility: hidden;">Précédent</button>
        <button class="btn-next" id="nextBtn" onclick="changeStep(1)">Continuer</button>
    </div>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 4;

    function changeStep(dir) {
        // Validation avant d'avancer
        if (dir === 1 && !validateStep()) return;

        // Cacher l'étape actuelle
        document.querySelector(`[data-step="${currentStep}"]`).classList.remove('active');
        
        // Changer d'étape
        currentStep += dir;
        if (currentStep > totalSteps) {
            alert("Formulaire envoyé ! (Simulé)");
            return;
        }

        // Afficher la nouvelle étape
        document.querySelector(`[data-step="${currentStep}"]`).classList.add('active');
        
        // Gérer l'affichage du bouton retour
        document.getElementById('prevBtn').style.visibility = currentStep > 1 ? 'visible' : 'hidden';
        document.getElementById('nextBtn').innerText = currentStep === totalSteps ? 'Finaliser' : 'Continuer';
    }

    function updateAgeFields(val) {
        const grid = document.getElementById('age-grid');
        grid.innerHTML = ""; // Reset
        const count = parseInt(val);
        
        if (count > 0) {
            for (let i = 1; i <= count; i++) {
                const input = document.createElement('input');
                input.type = "number";
                input.placeholder = "Âge " + i;
                input.name = "age_voyageur_" + i;
                input.className = "age-input";
                input.required = true;
                grid.appendChild(input);
            }
        }
    }

    function validateStep() {
        const activeStep = document.querySelector(`[data-step="${currentStep}"]`);
        const inputs = activeStep.querySelectorAll('input');
        for (let input of inputs) {
            if (!input.checkValidity()) {
                input.reportValidity();
                return false;
            }
        }
        return true;
    }
</script>

</body>
</html>
