<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voyage Mystère</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{--gold:#c9a24b}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:#f4f4f4;overflow:hidden}

/* BACKGROUND PARALLAX */
.bg{
position:fixed;
width:110%;height:110%;
background:url('https://images.unsplash.com/photo-1504198453319-5ce911bafcde') center/cover;
filter:blur(6px) brightness(0.8);
z-index:-1;
transform:scale(1.1);
animation:zoom 20s infinite alternate;
}
@keyframes zoom{from{transform:scale(1.1)}to{transform:scale(1.2)}}

.screen{
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
opacity:0;transform:translateX(100px) scale(0.96);
pointer-events:none;
transition:all .6s cubic-bezier(0.22,1,0.36,1);
}
.screen.active{opacity:1;transform:translateX(0) scale(1);pointer-events:auto}
.screen.exit{transform:translateX(-100px) scale(0.96);opacity:0}

.card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
padding:40px;border-radius:25px;
box-shadow:0 30px 80px rgba(0,0,0,0.2);
width:90%;max-width:520px;text-align:center;
animation:fadeUp .8s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1}}

button{
background:linear-gradient(135deg,var(--gold),#e6c97a);
border:none;color:white;padding:14px 26px;
border-radius:12px;margin-top:20px;
cursor:pointer;font-size:16px;
box-shadow:0 10px 25px rgba(201,162,75,.4);
transition:.3s;
}
button:hover{transform:scale(1.07)}

.cards{display:flex;gap:15px;margin-top:20px}
.choice{
flex:1;padding:20px;border-radius:15px;
background:white;cursor:pointer;
transition:.4s;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.choice:hover{transform:translateY(-8px) scale(1.03)}
.selected{
border:2px solid var(--gold);
transform:scale(1.05);
box-shadow:0 15px 30px rgba(201,162,75,.3);
}

input,select{
width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px
}

.progress{
position:fixed;top:0;left:0;height:4px;background:linear-gradient(to right,var(--gold),#fff);
transition:.4s;
}

.loader{font-size:18px;animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

</style>
</head>
<body>

<div class="bg"></div>
<div class="progress" id="progress"></div>

<div class="screen active" id="s1">
<div class="card">
<h2>Voyage Mystère ✈️</h2>
<p>Partez sans savoir où vous allez</p>
<button onclick="next()">Commencer</button>
</div>
</div>

<div class="screen" id="s2">
<div class="card">
<h2>Budget</h2>
<input type="range" min="500" max="30000" id="budget" oninput="budgetUpdate()">
<p id="btxt"></p>
<button onclick="next()">Suivant</button>
</div>
</div>

<div class="screen" id="s3">
<div class="card">
<h2>Dates</h2>
<input type="date" id="start">
<input type="date" id="end">
<button onclick="next()">Suivant</button>
</div>
</div>

<div class="screen" id="s4">
<div class="card">
<h2>Ambiance</h2>
<div class="cards">
<div class="choice" onclick="select(this,'mood','Plage')">🏝️</div>
<div class="choice" onclick="select(this,'mood','Montagne')">🏔️</div>
<div class="choice" onclick="select(this,'mood','Ville')">🌆</div>
</div>
<button onclick="next()">Suivant</button>
</div>
</div>

<div class="screen" id="s5">
<div class="card">
<h2>Hôtel</h2>
<div class="cards">
<div class="choice" onclick="select(this,'hotel','Classique')">Classique</div>
<div class="choice" onclick="select(this,'hotel','Premium')">Premium</div>
<div class="choice" onclick="select(this,'hotel','Luxe')">Luxe</div>
</div>
<button onclick="finish()">Terminer</button>
</div>
</div>

<div class="screen" id="s6">
<div class="card">
<h2>Création en cours...</h2>
<p class="loader">✈️ Génération de votre expérience</p>
</div>
</div>

<script>
let step=1,total=6,data={};

function next(){
let current=document.getElementById('s'+step);
let next=document.getElementById('s'+(step+1));

current.classList.remove('active');
current.classList.add('exit');
next.classList.add('active');

setTimeout(()=>current.classList.remove('exit'),600);

step++;
progress.style.width=(step/total*100)+'%';
}

function budgetUpdate(){
let v=budget.value;
btxt.innerText=v+'€';
data.budget=v;
}

function select(el,key,val){
el.parentNode.querySelectorAll('.choice').forEach(e=>e.classList.remove('selected'));
el.classList.add('selected');
data[key]=val;
}

function finish(){
next();
fetch('https://formspree.io/f/xdaynpav',{
method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)
});
setTimeout(()=>{
window.location.href="https://wa.me/33617572361?text="+encodeURIComponent(JSON.stringify(data,null,2));
},2500);
}

</script>

</body>
</html>
