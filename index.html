<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>L'Inconnu</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
    background: #0a0a0a;
    color: white;
    font-family: Inter, sans-serif;
    overflow: hidden;
}

.serif { font-family: 'Playfair Display', serif; }

.screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    transition: 0.6s ease;
}

.hidden-screen {
    opacity: 0;
    pointer-events: none;
    transform: translateY(40px);
}

.progress {
    position: fixed;
    top:0;
    left:0;
    height:3px;
    background:white;
    transition:0.4s;
}

.card {
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover { background:white; color:black; }
.card.active { background:white; color:black; }

button.main {
    margin-top:40px;
    padding:14px 30px;
    border-radius:999px;
    background:white;
    color:black;
}

input, select {
    background:transparent;
    border-bottom:1px solid #333;
    padding:10px;
    width:300px;
    text-align:center;
}
</style>
</head>

<body>

<div id="progress" class="progress" style="width:0%"></div>

<!-- INTRO -->
<div id="intro" class="screen">
<h1 class="serif text-5xl mb-6 text-center">
Fermez les yeux…<br>Votre destination existe déjà.
</h1>

<button onclick="next()" class="main">Commencer l’expérience</button>
</div>

<!-- QUESTIONS -->
<div id="q1" class="screen hidden-screen">
<h2 class="text-3xl serif mb-6">Quand souhaitez-vous partir ?</h2>
<input id="dates">
<button onclick="next()" class="main">Continuer</button>
</div>

<div id="q2" class="screen hidden-screen">
<h2 class="text-3xl serif mb-6">Quel est votre budget ?</h2>
<input type="range" id="budget" min="100" max="5000">
<p id="budgetVal">1000€</p>
<button onclick="next()" class="main">Continuer</button>
</div>

<div id="q3" class="screen hidden-screen">
<h2 class="text-3xl serif mb-6">Combien êtes-vous ?</h2>
<input id="personnes" type="number">
<button onclick="next()" class="main">Continuer</button>
</div>

<div id="q4" class="screen hidden-screen">
<h2 class="text-3xl serif mb-6">Sortir de l’UE ?</h2>
<div class="flex gap-6">
<div class="card" onclick="select(this,'oui')">Oui</div>
<div class="card" onclick="select(this,'non')">Non</div>
</div>
<button onclick="next()" class="main">Continuer</button>
</div>

<div id="q5" class="screen hidden-screen">
<h2 class="text-3xl serif mb-6">Type de voyage ?</h2>
<div class="flex gap-6">
<div class="card" onclick="select(this,'detente')">Détente</div>
<div class="card" onclick="select(this,'decouverte')">Découverte</div>
</div>
<button onclick="next()" class="main">Voir mon mystère</button>
</div>

<!-- FINAL -->
<div id="final" class="screen hidden-screen text-center">
<h2 class="text-4xl serif mb-6">Nous avons trouvé.</h2>
<p id="result" class="text-xl"></p>
</div>

<script>

flatpickr("#dates",{mode:"range"});

let step=0;
const screens=["intro","q1","q2","q3","q4","q5","final"];

function next(){
document.getElementById(screens[step]).classList.add("hidden-screen");
step++;
document.getElementById(screens[step]).classList.remove("hidden-screen");

document.getElementById("progress").style.width = (step/(screens.length-1))*100+"%";

if(screens[step]==="final"){
generate();
}
}

function select(el,val){
el.parentElement.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
el.parentElement.dataset.value=val;
}

// budget live
document.getElementById("budget").oninput = e=>{
document.getElementById("budgetVal").innerText=e.target.value+"€";
};

// générateur
function generate(){
let budget=document.getElementById("budget").value;

let result="";

if(budget<1500) result="Lisbonne, Budapest ou Athènes";
else if(budget<3000) result="Grèce, Maroc ou Croatie";
else result="Bali, Maldives ou Japon";

document.getElementById("result").innerText=result;

console.log("Suggestions privées :",result);
}

</script>

</body>
</html>
