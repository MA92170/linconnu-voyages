<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Inconnu | Expérience de Voyage</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@300;400;700&display=swap');

        :root { --accent: #d4af37; --bg: #05070a; }

        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* Arrière-plans immersifs */
        .bg-overlay {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            filter: brightness(0.25) saturate(0.8);
            transition: 1.2s ease-in-out;
        }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 1.5rem; text-align: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .hidden { opacity: 0; transform: translateY(20px); pointer-events: none; z-index: 0; }

        /* Inputs ultra-lisibles */
        .input-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 1.2rem 2rem; border-radius: 12px;
            color: #ffffff !important; font-size: 1.25rem;
            width: 100%; max-width: 400px;
            outline: none; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 1rem;
        }

        .input-box::placeholder { color: rgba(255,255,255,0.4); }
        .input-box:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.15); }

        /* Boutons */
        .btn-main {
            background: var(--accent); color: #000; font-weight: 800;
            padding: 1.2rem 3.5rem; border-radius: 999px; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.9rem; transition: 0.3s;
            margin-top: 2rem; border: none; cursor: pointer;
        }
        .btn-main:hover { transform: scale(1.05); background: #f1c40f; }

        .btn-back {
            position: absolute; top: 40px; left: 40px;
            color: white; font-size: 0.75rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
            background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 5px;
        }

        /* Fix spécifique pour Flatpickr dans un écran absolu */
        .flatpickr-calendar { 
            background: #1a1a1a !important; 
            border: 1px solid var(--accent) !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8) !important;
        }
        .flatpickr-months .flatpickr-month { background: #1a1a1a !important; color: white !important; }
        .flatpickr-innerContainer { padding: 10px; }
        
        /* Progress Bar */
        .progress { position: fixed; top: 0; left: 0; height: 4px; background: var(--accent); transition: 0.4s; z-index: 100; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

<div id="progress" class="progress" style="width:0%"></div>
<div id="bg-master" class="bg-overlay" style="background-image: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=2000');"></div>

<form id="form">

    <div id="intro" class="screen">
        <h1 class="text-6xl md:text-8xl serif italic mb-6">L'Inconnu</h1>
        <p class="text-white/80 mb-8 max-w-md tracking-wide">Osez l'imprévisible. Nous créons votre mystère.</p>
        <button type="button" onclick="next()" class="btn-main">Commencer</button>
    </div>

    <div id="q_depart" class="screen hidden">
        <button type="button" onclick="back()" class="btn-back">← Retour</button>
        <h2 class="text-4xl serif mb-10">Votre ville de départ ?</h2>
        <input type="text" name="depart" id="depart" class="input-box" placeholder="Ex: Paris, Lyon..." required>
        <button type="button" onclick="next()" class="btn-main">Continuer</button>
    </div>

    <div id="q1" class="screen hidden">
        <button type="button" onclick="back()" class="btn-back">← Retour</button>
        <h2 class="text-4xl serif mb-10">Quand souhaitez-vous fuir ?</h2>
        <input id="dates" name="dates" class="input-box cursor-pointer" placeholder="Cliquer pour choisir" required readonly>
        <button type="button" onclick="next()" class="btn-main">Valider ces dates</button>
    </div>

    <div id="q2" class="screen hidden">
        <button type="button" onclick="back()" class="btn-back">← Retour</button>
        <h2 class="text-4xl serif mb-10">Votre budget total ?</h2>
        <input type="range" name="budget" id="budget" min="500" max="10000" step="100" value="2500" class="w-64 accent-[#d4af37]">
        <p id="budgetVal" class="text-5xl font-bold mt-6 text-accent">2500€</p>
        <button type="button" onclick="next()" class="btn-main">Continuer</button>
    </div>

    <div id="final" class="screen hidden">
        <h2 class="text-5xl serif mb-6 italic">Prêt pour l'inconnu ?</h2>
        <button type="submit" class="btn-main animate-pulse">Envoyer ma demande</button>
    </div>

</form>

<script>
    // INITIALISATION FLATPICKR CORRIGÉE
    const fp = flatpickr("#dates", {
        mode: "range",
        minDate: "today",
        showMonths: window.innerWidth > 768 ? 2 : 1,
        locale: "fr",
        dateFormat: "d/m/Y",
        // CRUCIAL : On attache le calendrier au div de la question pour qu'il soit visible
        appendTo: document.getElementById('q1'), 
        inline: false,
        static: true // Garde le calendrier ancré à l'input
    });

    let step = 0;
    const screens = ["intro", "q_depart", "q1", "q2", "final"];

    function next() {
        const currentScreen = document.getElementById(screens[step]);
        const input = currentScreen.querySelector('input');
        
        if(step > 0 && input && !input.value) {
            alert("Veuillez remplir ce champ pour continuer ✨");
            return;
        }

        changeStep(1);
    }

    function back() {
        if(step > 0) changeStep(-1);
    }

    function changeStep(dir) {
        document.getElementById(screens[step]).classList.add("hidden");
        step += dir;
        document.getElementById(screens[step]).classList.remove("hidden");
        
        // Mise à jour barre de progression
        document.getElementById("progress").style.width = (step / (screens.length - 1)) * 100 + "%";
    }

    document.getElementById("budget").oninput = e => {
        document.getElementById("budgetVal").innerText = e.target.value + "€";
    };

    document.getElementById("form").onsubmit = function(e) {
        e.preventDefault();
        const data = new FormData(this);
        const msg = `L'INCONNU : \nDépart: ${data.get("depart")}\nDates: ${data.get("dates")}\nBudget: ${data.get("budget")}€`;
        window.open(`https://wa.me/33617572361?text=${encodeURIComponent(msg)}`);
    };
</script>

</body>
</html>
