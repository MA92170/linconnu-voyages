<section id="step-11">
        <h2>Qui embarque dans l’aventure ?</h2>
        <div id="passengers-list" style="background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 600px; max-height: 60vh; overflow-y: auto; border: 1px solid #eee;">
            </div>
        <button type="button" class="btn btn-gold" style="margin-top:20px;" onclick="finish()">Découvrir mon mystère 🤫</button>
    </section>

<script>
    // Ajoutez cette fonction pour générer les formulaires passagers
    function generatePassengerFields() {
        const container = document.getElementById('passengers-list');
        const nbAdultes = parseInt(document.getElementsByName('nb_adultes')[0].value) || 1;
        const nbEnfants = parseInt(document.getElementsByName('nb_enfants')[0].value) || 0;
        const total = nbAdultes + nbEnfants;
        
        container.innerHTML = ''; // Reset

        for (let i = 1; i <= total; i++) {
            const isFirst = (i === 1);
            const type = (i <= nbAdultes) ? "Adulte" : "Enfant";
            
            const html = `
                <div class="passenger-block" style="text-align:left; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #ddd;">
                    <h4 style="color: var(--gold); margin-bottom: 10px;">Voyageur ${i} (${type})</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="text" name="nom_voyageur_${i}" placeholder="Nom" required>
                        <input type="text" name="prenom_voyageur_${i}" placeholder="Prénom" required>
                    </div>
                    <div style="margin-top:10px;">
                        <label style="font-size: 0.8rem; opacity: 0.7;">Date de naissance</label>
                        <input type="date" name="dob_voyageur_${i}" required>
                    </div>
                    ${isFirst ? `
                    <div style="margin-top:10px;">
                        <input type="email" name="email_contact" placeholder="Email de contact (Obligatoire)" required>
                    </div>` : ''}
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }
    }

    // Modifiez votre fonction next() pour déclencher la génération à l'étape 11
    function next(s) {
        // Si on passe à l'étape 11, on génère les champs
        if(s === 11) {
            generatePassengerFields();
        }
        
        document.querySelector('section.active').classList.remove('active');
        document.getElementById('step-'+s).classList.add('active');
        step = s;
        document.getElementById('progress-bar').style.width = ((s-1)/(total-1)*100) + '%';
    }

    // Mise à jour de la fonction finish pour inclure tous les noms dans WhatsApp
    function finish() {
        // Vérification basique des champs requis avant de lancer l'anim
        const currentInputs = document.getElementById('passengers-list').querySelectorAll('input[required]');
        let valid = true;
        currentInputs.forEach(input => { if(!input.value) valid = false; });
        
        if(!valid) {
            alert("Veuillez remplir les informations de tous les voyageurs.");
            return;
        }

        next(12);
        const msgs = ["Sélection des meilleurs vols...", "Optimisation de l'hébergement...", "Calcul de l'indice mystère...", "C'est prêt !"];
        let i = 0;
        const interval = setInterval(() => {
            document.getElementById('loader-content').innerText = msgs[i];
            i++;
            if(i == msgs.length) {
                clearInterval(interval);
                submitForm();
            }
        }, 1500);
    }

    function submitForm() {
        const f = document.getElementById('mysteryForm');
        const data = new FormData(f);
        
        // Synthèse WhatsApp propre
        let text = "🎯 *NOUVELLE RÉSERVATION MYSTÈRE* 🎯\n\n";
        text += `💰 Budget: ${data.get('budget')}€\n`;
        text += `📅 Dates: ${data.get('dates')}\n`;
        text += `📍 Départ: ${data.get('ville_depart')}\n`;
        text += `🏨 Confort: ${data.get('standing')}\n`;
        text += `✨ Mood: ${data.get('mood')}\n\n`;
        text += `👥 *VOYAGEURS :*\n`;

        const nbAdultes = parseInt(data.get('nb_adultes')) || 1;
        const nbEnfants = parseInt(data.get('nb_enfants')) || 0;
        for(let i=1; i <= (nbAdultes + nbEnfants); i++) {
            text += `- ${data.get('prenom_voyageur_'+i)} ${data.get('nom_voyageur_'+i)} (${data.get('dob_voyageur_'+i)})\n`;
        }
        text += `\n📧 Contact: ${data.get('email_contact')}`;

        // Envoi Formspree
        fetch(f.action, { method: 'POST', body: data, headers: {'Accept': 'application/json'} })
        .then(() => {
            window.location.href = `https://wa.me/33617572361?text=${encodeURIComponent(text)}`;
        });
    }
</script>
