<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Inconnu</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body { background:black; color:white; font-family:Inter; }
.hidden { display:none; }
.step { display:none; }
.step.active { display:block; animation:fade 0.5s ease; }

@keyframes fade {
from {opacity:0; transform:translateY(20px);}
to {opacity:1; transform:translateY(0);}
}

.progress-bar { height:4px; background:#222; }
.progress { height:100%; background:white; width:0%; transition:0.4s; }

input, select, textarea {
background:black; border:1px solid #333;
padding:12px; width:100%; border-radius:8px;
}

button.primary {
background:white; color:black; padding:14px 30px;
border-radius:999px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="h-screen flex flex-col justify-center items-center text-center px-6">
<h1 class="text-5xl mb-6">L'Inconnu</h1>
<button onclick="start()" class="primary">Commencer l'expérience</button>
</div>

<!-- EXPERIENCE -->
<div id="quiz" class="hidden max-w-3xl mx-auto py-10 px-6">

<div class="progress-bar mb-10"><div id="progress" class="progress"></div></div>

<form id="form" action="https://formspree.io/f/mqakvjje" method="POST">

<!-- STEP 1 -->
<div class="step active">
<h2 class="text-2xl mb-6">Informations pratiques</h2>

<input id="dates" name="dates" placeholder="Dates de voyage" required>

<label>Budget</label>
<input type="range" name="budget" min="100" max="5000" value="1000" required>

<input type="number" name="personnes" placeholder="Nombre de personnes" required>

<textarea name="pays_eviter" placeholder="Pays à éviter" required></textarea>

<select name="passeport" required>
<option value="">Passeport valide ?</option>
<option>Oui</option>
<option>Non</option>
</select>

<select name="ue" required>
<option value="">Résident UE ?</option>
<option>Oui</option>
<option>Non</option>
</select>

</div>

<!-- STEP 2 -->
<div class="step">
<h2 class="text-2xl mb-6">Trajet avion</h2>

<select name="sortie_ue" required>
<option value="">Sortir de l’UE ?</option>
<option>Oui</option>
<option>Non</option>
</select>

<label>Heures de vol max</label>
<input type="range" name="heures_vol" min="0" max="10" required>

<select name="classe" required>
<option value="">Classe</option>
<option>Economy</option>
<option>Business</option>
</select>

<input type="number" name="bagage" placeholder="Bagages soute (nombre)" required>

</div>

<!-- STEP 3 -->
<div class="step">
<h2 class="text-2xl mb-6">Hébergement</h2>

<select name="logement" required>
<option value="">Type</option>
<option>Airbnb</option>
<option>Hôtel</option>
</select>

<select name="allinclusive" required>
<option value="">All inclusive ?</option>
<option>Oui</option>
<option>Non</option>
</select>

<select name="standing" required>
<option value="">Catégorie</option>
<option>Standard</option>
<option>Premium</option>
<option>Luxe</option>
</select>

</div>

<!-- STEP 4 -->
<div class="step">
<h2 class="text-2xl mb-6">Activités</h2>

<select name="style" required>
<option value="">Détente ou découverte</option>
<option>Détente</option>
<option>Découverte</option>
</select>

<select name="culture" required>
<option value="">Culture ?</option>
<option>Oui</option>
<option>Non</option>
</select>

<select name="randonnee" required>
<option value="">Randonnée ?</option>
<option>Oui</option>
<option>Non</option>
</select>

</div>

<!-- NAV -->
<div class="flex justify-between mt-10">
<button type="button" onclick="prev()">Retour</button>
<button type="button" onclick="next()">Suivant</button>
<button type="submit" id="submit" class="primary hidden">Envoyer</button>
</div>

</form>
</div>

<script>

// flatpickr
flatpickr("#dates",{mode:"range",minDate:"today"});

// start
function start(){
document.getElementById("intro").style.display="none";
document.getElementById("quiz").classList.remove("hidden");
}

// navigation
let step=0;
const steps=document.querySelectorAll(".step");

function update(){
steps.forEach(s=>s.classList.remove("active"));
steps[step].classList.add("active");

document.getElementById("progress").style.width=((step+1)/steps.length)*100+"%";

document.querySelector("#submit").style.display = step===steps.length-1 ? "block":"none";
}

function next(){
if(!steps[step].querySelectorAll("input,select,textarea:invalid").length){
step++; update();
}else{ alert("Remplis tous les champs"); }
}

function prev(){ if(step>0){ step--; update(); } }

// GENERATEUR DESTINATION
function generateDestination(data){
let results=[];

if(data.get("style")==="Détente"){
results.push("Bali","Maldives","Grèce");
}
if(data.get("randonnee")==="Oui"){
results.push("Islande","Norvège");
}
if(data.get("budget")<1500){
results.push("Portugal","Croatie");
}

return [...new Set(results)].slice(0,3);
}

// SUBMIT
document.getElementById("form").onsubmit=function(e){
e.preventDefault();

const data=new FormData(this);

// 🔮 génération
const suggestions=generateDestination(data);
console.log("DESTINATIONS SUGGÉRÉES :",suggestions);

// WhatsApp
const msg=`Voyage mystère :
Budget: ${data.get("budget")}
Personnes: ${data.get("personnes")}
Style: ${data.get("style")}`;

window.open(`https://wa.me/33617572361?text=${encodeURIComponent(msg)}`);

// Formspree
this.submit();

// Email (Formspree fera le mail automatiquement)
alert("Demande envoyée ✨");
}

</script>

</body>
</html>
