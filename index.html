<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Inconnu | Expérience</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@300;400;700&display=swap');

        :root { --accent: #d4af37; --bg: #05070a; }

        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .serif { font-family: 'Playfair Display', serif; }

        /* Background Immersif */
        .bg-overlay {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=2000');
            background-size: cover; background-position: center;
            filter: brightness(0.2); transition: 1s;
        }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem; text-align: center;
            transition: all 0.6s ease-in-out;
        }

        .hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }

        /* Inputs & Boutons */
        .input-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem; border-radius: 12px;
            color: white; font-size: 1.5rem; outline: none; text-align: center;
        }

        .btn-main {
            background: var(--accent); color: black; font-weight: 800;
            padding: 1.2rem 3rem; border-radius: 999px; text-transform: uppercase;
            letter-spacing: 2px; margin-top: 2rem; transition: 0.3s; cursor: pointer;
        }

        .btn-back {
            position: absolute; top: 30px; left: 30px; color: white;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
            opacity: 0.5; cursor: pointer;
        }

        /* CUSTOM CALENDAR INLINE */
        #calendar-container { margin-bottom: 10px; }
        .flatpickr-calendar.inline {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
            width: auto !important;
        }
        .flatpickr-months .flatpickr-month { background: transparent !important; }
        .flatpickr-day.selected { background: var(--accent) !important; border-color: var(--accent) !important; color: black !important; }
        .flatpickr-day.inRange { background: rgba(212, 175, 55, 0.2) !important; border: none !important; }
        
        /* Progress Bar */
        .progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); transition: 0.4s; }
    </style>
</head>
<body>

<div id="progress" class="progress" style="width:0%"></div>
<div class="bg-overlay"></div>

<form id="form">

    <div id="intro" class="screen">
        <h1 class="text-7xl serif italic mb-4">L'Inconnu</h1>
        <p class="text-white/60 mb-8 tracking-widest uppercase text-xs">Osez l'imprévisible</p>
        <button type="button" onclick="next()" class="btn-main">Commencer</button>
    </div>

    <div id="q_depart" class="screen hidden">
        <div onclick="back()" class="btn-back">← Retour</div>
        <h2 class="text-4xl serif mb-10">D'où partez-vous ?</h2>
        <input type="text" name="depart" class="input-box" placeholder="Ville de départ" required>
        <button type="button" onclick="next()" class="btn-main">Continuer</button>
    </div>

    <div id="q_dates" class="screen hidden">
        <div onclick="back()" class="btn-back">← Retour</div>
        <h2 class="text-4xl serif mb-6">Vos dates de départ et retour</h2>
        <div id="calendar-container"></div> <input type="hidden" id="dates_input" name="dates" required>
        <button type="button" onclick="next()" class="btn-main">Confirmer les dates</button>
    </div>

    <div id="q_budget" class="screen hidden">
        <div onclick="back()" class="btn-back">← Retour</div>
        <h2 class="text-4xl serif mb-10">Votre budget total ?</h2>
        <input type="range" name="budget" id="budget" min="500" max="10000" step="100" value="2500" class="w-64 accent-[#d4af37]">
        <p id="budgetVal" class="text-5xl font-bold mt-6 text-accent">2500€</p>
        <button type="button" onclick="next()" class="btn-main">Continuer</button>
    </div>

    <div id="final" class="screen hidden">
        <h2 class="text-5xl serif mb-6 italic">Tout est prêt.</h2>
        <button type="submit" class="btn-main">Envoyer ma demande</button>
    </div>

</form>

<script>
    let step = 0;
    const screens = ["intro", "q_depart", "q_dates", "q_budget", "final"];

    // INITIALISATION DU CALENDRIER EN MODE INLINE (Visible de suite)
    const fp = flatpickr("#calendar-container", {
        inline: true,
        mode: "range",
        minDate: "today",
        showMonths: window.innerWidth > 768 ? 2 : 1, // 2 mois sur PC, 1 sur Mobile
        locale: "fr",
        dateFormat: "d/m/Y",
        onChange: function(selectedDates, dateStr) {
            document.getElementById('dates_input').value = dateStr;
        }
    });

    function next() {
        // Validation basique
        const currentScreen = document.getElementById(screens[step]);
        const input = currentScreen.querySelector('input');
        if(step > 0 && input && !input.value) {
            alert("Merci de compléter cette étape ✨");
            return;
        }
        changeStep(1);
    }

    function back() {
        if(step > 0) changeStep(-1);
    }

    function changeStep(dir) {
        document.getElementById(screens[step]).classList.add("hidden");
        step += dir;
        document.getElementById(screens[step]).classList.remove("hidden");
        document.getElementById("progress").style.width = (step / (screens.length - 1)) * 100 + "%";
    }

    document.getElementById("budget").oninput = e => {
        document.getElementById("budgetVal").innerText = e.target.value + "€";
    };

    document.getElementById("form").onsubmit = function(e) {
        e.preventDefault();
        const data = new FormData(this);
        const msg = `L'INCONNU : \nDépart: ${data.get("depart")}\nDates: ${data.get("dates")}\nBudget: ${data.get("budget")}€`;
        window.open(`https://wa.me/33617572361?text=${encodeURIComponent(msg)}`);
    };
</script>

</body>
</html>
