<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voyage Mystère — Mobile Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --gold: #c9a84c;
        --gold-light: #e8d08a;
        --gold-pale: #fdf8ee;
        --dark: #1a1814;
        --text: #2c2a25;
        --text-muted: #6b6355;
        --text-hint: #9a9180;
        --bg: #faf9f7;
        --border: #e0dace;
        --error: #c0392b;
        --font-display: 'Cormorant Garamond', serif;
        --font-body: 'Jost', sans-serif;
        --radius: 12px;
    }

    html, body { 
        height: 100dvh; 
        overflow: hidden; 
        background: var(--dark);
        font-family: var(--font-body);
        -webkit-tap-highlight-color: transparent;
    }

    body { display: flex; align-items: center; justify-content: center; }

    /* ── Shell Adaptatif ── */
    .shell {
        width: 100%;
        max-width: 600px;
        height: 100dvh;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        position: relative;
    }

    @media (min-width: 600px) {
        .shell { height: 90dvh; border-radius: 20px; overflow: hidden; }
    }

    /* ── Header ── */
    .topbar {
        background: var(--dark);
        padding: 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        z-index: 10;
        flex-shrink: 0;
    }
    .logo { font-family: var(--font-display); font-size: 0.8rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
    .prog-wrap { flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; }
    .prog-fill { height: 100%; background: var(--gold); width: 10%; transition: width 0.4s ease; }

    /* ── Pages ── */
    .page {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow-y: auto;
        padding-bottom: 110px; /* Espace pour le menu fixe */
        position: relative;
        overscroll-behavior: contain;
    }
    .page.active { display: flex; animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .content { padding: 1.5rem; width: 100%; display: flex; flex-direction: column; gap: 1.2rem; z-index: 2; position: relative; }
    .bg-img { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
    .overlay-light { position: absolute; inset: 0; background: rgba(250,249,247,0.95); z-index: 1; }
    .overlay-dark { position: absolute; inset: 0; background: rgba(20,18,12,0.6); z-index: 1; }

    /* ── UI Elements ── */
    h1.hero { font-family: var(--font-display); font-size: 1.8rem; color: #fff; text-align: center; line-height: 1.2; }
    h2.qtitle { font-family: var(--font-display); font-size: 1.4rem; color: var(--text); text-align: center; }
    .step-tag { font-size: 0.7rem; text-transform: uppercase; color: var(--gold); text-align: center; font-weight: 600; letter-spacing: 1px; }

    .scard { background: #fff; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); width: 100%; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    
    .selcard {
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
        overflow: hidden;
        cursor: pointer;
        transition: 0.2s;
    }
    .selcard.sel { border-color: var(--gold); background: var(--gold-pale); }
    .selcard img { width: 100%; height: 80px; object-fit: cover; }
    .selcard .cl { padding: 0.6rem; font-size: 0.85rem; text-align: center; font-weight: 500; }

    /* ── Form Inputs ── */
    .fg { display: flex; flex-direction: column; gap: 0.4rem; }
    .fg label { font-size: 0.7rem; color: var(--text-hint); text-transform: uppercase; }
    .fg input, .fg select {
        padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border);
        font-family: var(--font-body); font-size: 0.95rem; background: #fff;
    }

    /* ── Navigation Fixe ── */
    .nav-fixed {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 1rem 1.5rem;
        background: white;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
    }
    .btn-next {
        background: var(--dark); color: var(--gold);
        border: 1px solid var(--gold); padding: 0.8rem 1.8rem;
        border-radius: 50px; font-weight: 600; text-transform: uppercase;
    }
    .btn-back { background: none; border: none; color: var(--text-hint); text-decoration: underline; }

    /* Slider */
    .slider-val { font-size: 1.8rem; font-family: var(--font-display); text-align: center; color: var(--gold); }
    input[type=range] { width: 100%; accent-color: var(--gold); height: 6px; }

</style>
</head>
<body>

<div class="shell">
    <div class="topbar">
        <div class="logo">✦ Voyage Mystère</div>
        <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
    </div>

    <!-- P1: INTRO -->
    <div class="page active" id="p1" style="justify-content: center;">
        <div class="bg-img" style="background-image:url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800')"></div>
        <div class="overlay-dark"></div>
        <div class="content">
            <h1 class="hero">Prêt pour l'inconnu ?</h1>
            <p style="color: #fff; text-align: center; opacity: 0.8;">Répondez à quelques questions, nous préparons votre voyage mystère.</p>
            <button class="btn-next" style="width: 100%; margin-top: 2rem;" onclick="goTo(2)">Commencer</button>
        </div>
    </div>

    <!-- P2: BUDGET -->
    <div class="page" id="p2">
        <div class="content">
            <div class="step-tag">Étape 1</div>
            <h2 class="qtitle">Votre budget par personne ?</h2>
            <div class="scard">
                <div class="slider-val" id="budget-val">3 000 €</div>
                <input type="range" min="500" max="10000" step="100" value="3000" oninput="document.getElementById('budget-val').innerText = this.value + ' €'">
            </div>
        </div>
        <div class="nav-fixed">
            <button class="btn-back" onclick="goTo(1)">Retour</button>
            <button class="btn-next" onclick="goTo(3)">Continuer</button>
        </div>
    </div>

    <!-- P3: AMBIANCE -->
    <div class="page" id="p3">
        <div class="content">
            <div class="step-tag">Étape 2</div>
            <h2 class="qtitle">Quelle ambiance ?</h2>
            <div class="grid2">
                <div class="selcard" onclick="toggleCard(this)">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300">
                    <div class="cl">Plage</div>
                </div>
                <div class="selcard" onclick="toggleCard(this)">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=300">
                    <div class="cl">Montagne</div>
                </div>
                <div class="selcard" onclick="toggleCard(this)">
                    <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=300">
                    <div class="cl">Ville</div>
                </div>
                <div class="selcard" onclick="toggleCard(this)">
                    <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=300">
                    <div class="cl">Aventure</div>
                </div>
            </div>
        </div>
        <div class="nav-fixed">
            <button class="btn-back" onclick="goTo(2)">Retour</button>
            <button class="btn-next" onclick="goTo(4)">Continuer</button>
        </div>
    </div>

    <!-- P4: VOL & CONTRAINTES -->
    <div class="page" id="p4">
        <div class="content">
            <div class="step-tag">Étape 3</div>
            <h2 class="qtitle">Vos contraintes</h2>
            <div class="scard">
                <div class="fg">
                    <label>Villes / Pays à éviter</label>
                    <input type="text" placeholder="Ex: Dubaï, New York...">
                </div>
            </div>
            <div class="scard">
                <div class="fg">
                    <label>Durée de vol max</label>
                    <select>
                        <option>3h</option>
                        <option selected>6h</option>
                        <option>10h+</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="nav-fixed">
            <button class="btn-back" onclick="goTo(3)">Retour</button>
            <button class="btn-next" onclick="goTo(5)">Continuer</button>
        </div>
    </div>

    <!-- P5: GROUPE -->
    <div class="page" id="p5">
        <div class="content">
            <div class="step-tag">Étape 4</div>
            <h2 class="qtitle">Avec qui partez-vous ?</h2>
            <div class="fg">
                <label>Nombre de voyageurs</label>
                <select id="nb-persons">
                    <option value="1">1 personne</option>
                    <option value="2" selected>2 personnes</option>
                    <option value="3">3 personnes</option>
                    <option value="4+">4+ personnes</option>
                </select>
            </div>
            <div class="scard">
                <div class="fg">
                    <label>Bagages en soute</label>
                    <select>
                        <option>Cabine uniquement</option>
                        <option>Avec bagages en soute</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="nav-fixed">
            <button class="btn-back" onclick="goTo(4)">Retour</button>
            <button class="btn-next" onclick="goTo(6)">Continuer</button>
        </div>
    </div>

    <!-- P6: DÉPART -->
    <div class="page" id="p6">
        <div class="content">
            <div class="step-tag">Étape 5</div>
            <h2 class="qtitle">Point de départ</h2>
            <div class="fg">
                <label>Ville de départ</label>
                <input type="text" placeholder="Ex: Paris, Lyon...">
            </div>
            <div class="fg">
                <label>Aéroport préféré</label>
                <input type="text" placeholder="Ex: CDG, ORY...">
            </div>
        </div>
        <div class="nav-fixed">
            <button class="btn-back" onclick="goTo(5)">Retour</button>
            <button class="btn-next" onclick="alert('Formulaire terminé !');">Terminer</button>
        </div>
    </div>

</div>

<script>
    function goTo(step) {
        // Cacher toutes les pages
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        
        // Afficher la cible
        const target = document.getElementById('p' + step);
        if(target) {
            target.classList.add('active');
            // Scroll en haut de la nouvelle page
            target.scrollTop = 0;
        } else {
            console.error("La page p" + step + " n'existe pas dans le HTML.");
        }

        // Progression (sur 6 étapes ici)
        const totalSteps = 6;
        const progress = (step / totalSteps) * 100;
        document.getElementById('prog').style.width = progress + '%';
    }

    function toggleCard(el) {
        el.classList.toggle('sel');
    }
</script>

</body>
</html>
