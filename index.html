<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Inconnu | Conciergerie de Voyages Mystères</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .hero-gradient {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center;
        }
        .form-input { 
            width: 100%; border-bottom: 1px solid #e2e8f0; border-top: 0; border-left: 0; border-right: 0;
            padding: 1rem 0; outline: none; transition: border-color 0.3s; background: transparent;
        }
        .form-input:focus { border-color: #0f172a; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="flex justify-between items-center px-8 py-6 absolute w-full z-10 text-white">
        <div class="text-2xl font-bold tracking-tighter serif italic">L'INCONNU</div>
    </nav>

    <header class="h-screen flex items-center justify-center text-center text-white hero-gradient px-4">
        <div class="max-w-3xl">
            <h1 class="text-5xl md:text-7xl mb-6 italic font-bold">L'art de l'imprévisible.</h1>
            <p class="text-lg md:text-xl mb-10 font-light tracking-wide italic">Confiez-nous vos désirs, nous dessinons votre horizon.</p>
            <a href="#experience-form" class="bg-white text-slate-900 px-10 py-4 rounded-full font-semibold uppercase tracking-widest hover:bg-slate-100 transition duration-300">Commencer l'expérience</a>
        </div>
    </header>

    <section id="experience-form" class="py-24 px-6 max-w-2xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl mb-4">Votre Profil de Voyageur</h2>
            <p class="text-slate-500 italic">Pour créer l'exceptionnel, nous avons besoin de vous comprendre.</p>
        </div>

        <form id="travelForm" action="https://formspree.io/f/xdaynpav" method="POST" class="space-y-12">
            <div>
                <label class="text-xs uppercase tracking-[0.2em] font-bold text-slate-400">Mémoire de voyage</label>
                <input type="text" name="derniere_destination" id="q1" placeholder="Quelle fut votre dernière destination marquante ?" class="form-input" required>
            </div>

            <div>
                <label class="text-xs uppercase tracking-[0.2em] font-bold text-slate-400">Aspirations</label>
                <input type="text" name="envies_prochaines" id="q2" placeholder="De quoi rêvez-vous pour votre prochaine escale ?" class="form-input" required>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <label class="text-xs uppercase tracking-[0.2em] font-bold text-slate-400">Esprit d'aventure</label>
                    <select name="sentiers_battus" id="q3" class="form-input">
                        <option value="Standard">Confort classique</option>
                        <option value="Hors-piste">Sortir des sentiers battus</option>
                        <option value="Exploration">Immersion totale / Sauvage</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs uppercase tracking-[0.2em] font-bold text-slate-400">Engagement</label>
                    <select name="eco_tourisme" id="q4" class="form-input">
                        <option value="Peu sensible">Le luxe avant tout</option>
                        <option value="Sensible">Éco-responsabilité bienvenue</option>
                        <option value="Prioritaire">Éco-tourisme engagé uniquement</option>
                    </select>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <label class="text-xs uppercase tracking-[0.2em] font-bold text-slate-400">Rythme</label>
                    <select name="rythme" id="q5" class="form-input">
                        <option value="Farniente">L'art du farniente</option>
                        <option value="Rando">L'appel de la randonnée</option>
                        <option value="Equilibre">Un équilibre subtil</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs uppercase tracking-[0.2em] font-bold text-slate-400">Environnement</label>
                    <select name="paysage" id="q6" class="form-input">
                        <option value="Plage">L'infini de la Plage</option>
                        <option value="Montagne">La majesté de la Montagne</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-xs uppercase tracking-[0.2em] font-bold text-slate-400">Atmosphère</label>
                <select name="atmosphere" id="q7" class="form-input">
                    <option value="Culture">Soif de Culture & Histoire</option>
                    <option value="Evasion">Besoin de pure Évasion</option>
                </select>
            </div>

            <input type="hidden" name="_replyto" value="marcfornareso@gmail.com">

            <div class="pt-8 text-center">
                <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-full uppercase tracking-widest font-bold hover:shadow-xl transition duration-300">
                    Découvrir ma proposition mystère
                </button>
                <p class="mt-4 text-xs text-slate-400">Une copie sera envoyée par Email et WhatsApp.</p>
            </div>
        </form>
    </section>

    <footer class="py-12 text-center text-slate-400 text-[10px] uppercase tracking-widest border-t border-slate-100">
        <p>&copy; 2024 L'INCONNU — Conciergerie Privée</p>
    </footer>

   <script>
    document.getElementById('travelForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const q1 = document.getElementById('q1').value;
        const q2 = document.getElementById('q2').value;
        const q3 = document.getElementById('q3').value;
        const q4 = document.getElementById('q4').value;
        const q5 = document.getElementById('q5').value;
        const q6 = document.getElementById('q6').value;
        const q7 = document.getElementById('q7').value;

        const message = "NOUVELLE DEMANDE L'INCONNU\n\n" +
                        "• Dernière destination : " + q1 + "\n" +
                        "• Prochaine envie : " + q2 + "\n" +
                        "• Style : " + q3 + "\n" +
                        "• Eco : " + q4 + "\n" +
                        "• Rythme : " + q5 + "\n" +
                        "• Lieu : " + q6 + "\n" +
                        "• Vibe : " + q7;

        const encodedText = encodeURIComponent(message);
        const phoneNumber = "33617572361";

        // Détection du support (Mobile vs Desktop)
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // On choisit le bon préfixe selon le support
        const baseUrl = isMobile ? "https://wa.me/" : "https://web.whatsapp.com/send";
        
        const finalUrl = baseUrl + "?phone=" + phoneNumber + "&text=" + encodedText;

        // Redirection
        window.location.href = finalUrl;
    });
</script>
</body>
</html>
